name: Lint Code

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install --save-dev eslint stylelint stylelint-config-standard htmlhint

      - name: Lint JavaScript
        run: npx eslint '**/*.js' --max-warnings 0 || true

      - name: Lint CSS
        run: npx stylelint '**/*.css' || true

      - name: Lint HTML
        run: npx htmlhint '**/*.html' || true
