<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#080808" />
  <title>Raffaele Suppa</title>
  <script>
    (function () {
      const getSystemTheme = () =>
        window.matchMedia("(prefers-color-scheme: dark)").matches
          ? "dark"
          : "light";

      const getSavedTheme = () => {
        try {
          const saved = localStorage.getItem("theme");
          return ["dark", "light", "auto"].includes(saved) ? saved : "auto";
        } catch {
          return "auto";
        }
      };

      const resolveTheme = (theme) =>
        theme === "auto" ? getSystemTheme() : theme;
      const actualTheme = resolveTheme(getSavedTheme());
      const current = document.documentElement.getAttribute("data-theme");

      // Only mutate if the value actually changes — avoids aborting an in-progress transition
      if (current !== actualTheme) {
        document.documentElement.setAttribute("data-theme", actualTheme);
      }

      // Stamp aria-pressed before first paint so CSS hides the active button immediately,
      // preventing layout shift caused by deferred JS toggling display:none after render.
      const savedTheme = getSavedTheme();
      document.addEventListener("DOMContentLoaded", function () {
        document
          .querySelectorAll("[data-theme-toggle]")
          .forEach(function (btn) {
            btn.setAttribute(
              "aria-pressed",
              btn.dataset.themeToggle === savedTheme ? "true" : "false",
            );
          });
      });
    })();
  </script>

  <!-- Preload critical stylesheets -->
  <link rel="preload" href="css/tokens.css" as="style" />
  <link rel="preload" href="css/reset.css" as="style" />

</head>

<body data-page="index">

    <!-- ✅ Browser support warnings - hidden by default via CSS @supports -->
    <div class="support view-transition" role="alert" aria-live="assertive">
      ⚠️ Your browser doesn't support View Transitions
    </div>
    <div class="support style-query" role="alert" aria-live="assertive">
      ⚠️ Your browser doesn't support Style Queries
    </div>

    <!-- ✅ header: labelledby ties header to its quote content -->
    <header aria-labelledby="site-quote">
      <p id="site-quote" class="header-text">
        "there will be an answer; Let It Be!"
      </p>
      <p class="header-break" aria-hidden="true">--the beatles</p>
    </header>
    <!-- ✅ main: labelledby ties main to visible h1 -->
    <main aria-labelledby="site-heading">
      <h1 id="site-heading" class="site-title">
        This site contains 1 (One);
      </h1>
      <div class="text-with-animation">
        <span>raffaele</span>&nbsp;<span>suppa</span>
      </div>
      <div class="subtext-with-animation">
        <span>imagine</span>&nbsp;<span>that</span>
      </div>
      <div class="subtext-with-animation-1">
        !
      </div>
      <!-- ✅ btn: labelledby ties button to its visible text -->
      <button class="btn" aria-labelledby="btn-label" aria-describedby="btn-description">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" role="img"

        </svg>
        <span class="button-text">
          <span id="btn-label">click the sneaker</span>
          <span id="btn-description">you can get off anywhere</span>
        </span>
      </button>
    </main>
    <!-- ✅ footer: labelledby ties footer to theme switcher legend -->
    <footer aria-label="Site settings">
      <p class="footer-text">this is where the apple fell</p>

          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" aria-hidden="true">
            <path fill="currentColor"
              d="M12.075 21q-1.888 0-3.543-.713T5.64 18.336t-1.951-2.893t-.714-3.543q0-2.639 1.395-4.846t3.77-3.345q.177-.067.35-.058q.174.008.308.093q.123.079.197.238t.074.39q.108 2.09.925 3.963t2.295 3.351t3.353 2.295t3.968.925q.236 0 .386.068t.229.192q.085.134.099.313t-.053.35q-1.13 2.375-3.344 3.773T12.075 21m0-1q2.2 0 4.075-1.1t2.95-3.025q-2.15-.2-4.075-1.097t-3.45-2.422t-2.425-3.44T8.075 4.85Q6.15 5.925 5.063 7.813T3.975 11.9q0 3.375 2.363 5.738T12.075 20m2.071-12.97L12.99 5.874q-.243-.242-.243-.565q0-.324.243-.566l1.157-1.158q.243-.242.566-.242t.565.242l1.158 1.158q.242.242.242.566t-.242.565l-1.158 1.158q-.242.242-.565.242t-.566-.242m5.212 3.211l-.581-.561q-.165-.165-.165-.373t.165-.373l.58-.562q.166-.165.364-.165t.364.165l.561.562q.166.165.166.373t-.166.373l-.561.561q-.166.166-.364.166t-.363-.166" />

        <button data-theme-toggle="auto" aria-label="Switch to system theme" aria-pressed="false">

          </svg>
        </button>
      </fieldset>

      <!-- ✅ Live region announces theme changes to screen readers -->
      <div id="theme-announcement" class="visually-hidden" role="status" aria-live="polite" aria-atomic="true"></div>
    </footer>
  </div>
</body>

</html>
